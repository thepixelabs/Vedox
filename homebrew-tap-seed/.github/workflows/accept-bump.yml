name: accept version bump

# Auto-merges goreleaser version-bump PRs that satisfy all three guards:
#   1. Author is github-actions[bot] from a branch starting with chore/bump-vedox-
#   2. Exactly one file changed: Formula/vedox.rb
#   3. Diff only touches version / url / sha256 lines
#   4. brew audit --strict --online passes
#
# Any PR that fails any guard is left open for human review.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'chore/bump-vedox-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: verify single file changed
        run: |
          count=$(git diff --name-only origin/main...HEAD | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "ERROR: expected exactly 1 file changed, got $count"
            exit 1
          fi
          changed=$(git diff --name-only origin/main...HEAD)
          if [ "$changed" != "Formula/vedox.rb" ]; then
            echo "ERROR: unexpected file changed: $changed"
            exit 1
          fi

      - name: verify diff touches only version/url/sha256 lines
        run: |
          diff_lines=$(git diff origin/main...HEAD -- Formula/vedox.rb \
            | grep '^[+-]' | grep -v '^[+-][+-][+-]')
          bad=$(echo "$diff_lines" | grep -vE '^\+?-?\s*(version|url|sha256)' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: diff contains unexpected changes:"
            echo "$bad"
            exit 1
          fi

      - name: set up homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: brew audit
        run: |
          brew install --formula Formula/vedox.rb
          brew audit --strict --online Formula/vedox.rb

      - name: auto-merge
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
            });
