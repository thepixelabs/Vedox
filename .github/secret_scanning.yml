# GitHub Secret Scanning — path exclusions
#
# These paths contain fake secrets used as test fixtures for our own
# secret-scanner package (apps/cli/internal/secretscan/). The strings
# look like real AWS keys, Stripe keys, GitHub PATs, etc. by design —
# they exist so our gate tests can prove the scanner blocks commits
# that contain them.
#
# This file tells GitHub's Secret Scanning to skip these paths when
# surfacing alerts. It does NOT bypass Push Protection on first
# appearance of a new pattern — that still requires a one-time
# "allow this secret" click via the unblock URL GitHub prints.

paths-ignore:
  - "apps/cli/internal/secretscan/testdata/**"
  - "apps/cli/internal/secretscan/secretscan_test.go"
  - "apps/cli/internal/secretscan/integration_test.go"
  - "apps/cli/internal/secretscan/betterleaks_adapter_test.go"
  - "apps/cli/internal/secretscan/betterleaks_gaps_test.go"
