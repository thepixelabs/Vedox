<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark light" />
		<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicon-192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/favicon-512.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/favicon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<script>
			// Pre-hydration theme sync — avoids light-flash-of-dark.
			try {
				var t = localStorage.getItem('vedox-theme');
				if (t === 'light' || t === 'dark') {
					document.documentElement.setAttribute('data-theme', t);
				}
			} catch (_) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
